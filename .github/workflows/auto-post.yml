name: 記事自動投稿

on:
  schedule:
    - cron: '0 0 * * *'   # 09:00 JST (UTC+9)
    - cron: '0 4 * * *'   # 13:00 JST
    - cron: '0 8 * * *'   # 17:00 JST
  workflow_dispatch:       # 手動実行も可能

permissions:
  contents: write

jobs:
  auto-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install script dependencies
        run: cd scripts && npm install

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/auto-post.mjs

      - name: Commit and push
        run: |
          git config user.name "AI Auto Poster"
          git config user.email "autopost@ai-katsuyo-guide.com"
          git add posts/ scripts/topics.json
          git diff --staged --quiet || (git commit -m "🤖 記事自動投稿: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M')" && git push)
